<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-container {
      width: 380px;
      text-align: center;
    }
    .logo {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: #e8740c;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-icon::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 3px solid #fff;
      border-radius: 2px;
      transform: rotate(45deg);
      position: absolute;
    }
    .logo-text {
      font-size: 42px;
      font-weight: 700;
      color: #1a3a5c;
      letter-spacing: 4px;
    }
    .logo-text span { color: #e8740c; }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: 24px;
      text-align: left;
    }
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-group .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #1a3a5c;
    }
    .keep-signed-in {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      text-align: left;
    }
    .keep-signed-in input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .keep-signed-in label {
      font-size: 14px;
      color: #333;
    }
    .btn-signin {
      width: 100%;
      padding: 14px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #254d73; }
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }
    .divider span {
      padding: 0 16px;
      color: #999;
      font-size: 13px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-microsoft {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: background 0.2s;
    }
    .btn-microsoft:hover { background: #f5f5f5; }
    .ms-logo {
      display: grid;
      grid-template-columns: 8px 8px;
      grid-template-rows: 8px 8px;
      gap: 2px;
    }
    .ms-logo div:nth-child(1) { background: #f25022; }
    .ms-logo div:nth-child(2) { background: #7fba00; }
    .ms-logo div:nth-child(3) { background: #00a4ef; }
    .ms-logo div:nth-child(4) { background: #ffb900; }
    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      font-size: 13px;
    }
    .footer-links a {
      color: #666;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: left;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text"><span>GAVEL</span></div>
    </div>

    <h1>Sign In</h1>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <span class="icon">&#128100;</span>
        <input type="text" id="username" name="username" placeholder="Email or username" autocomplete="username">
      </div>

      <div class="input-group">
        <span class="icon">&#128274;</span>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password">
      </div>

      <div class="error-msg" id="errorMsg">Invalid username or password.</div>

      <div class="keep-signed-in">
        <input type="checkbox" id="keepSignedIn">
        <label for="keepSignedIn">Keep me signed in</label>
      </div>

      <button type="submit" class="btn-signin">SIGN IN</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="btn-microsoft" onclick="alert('Microsoft SSO is not available in test mode')">
      <div class="ms-logo"><div></div><div></div><div></div><div></div></div>
      Sign in with Microsoft
    </button>

    <div class="footer-links">
      <a href="#">Support</a>
      <div>
        <a href="#">Forgot password?</a>
        <a href="#" style="margin-left: 8px;">Terms</a>
        <a href="#" style="margin-left: 8px;">Privacy</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      if (user === 'username' && pass === 'password') {
        sessionStorage.setItem('gavel365_auth', 'true');
        window.location.href = 'app.html#/matters/GAVEL-0007';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });

    document.getElementById('username').addEventListener('input', function() {
      document.getElementById('errorMsg').style.display = 'none';
    });
    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('errorMsg').style.display = 'none';
    });
  </script>
</body>
</html>
